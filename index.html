<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast 2D Runner Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
        #gameContainer { position: relative; width: 100%; height: 100%; max-width: 800px; max-height: 450px; margin: auto; background: linear-gradient(to bottom, #1a0b2e, #4c1c5c); overflow: hidden; }
        #player { position: absolute; width: 40px; height: 40px; background: #ff007f; border-radius: 8px; bottom: 50px; left: 50px; box-shadow: 0 0 10px #ff007f; }
        .obstacle { position: absolute; width: 30px; height: 45px; background: #00ffff; border-radius: 4px; bottom: 50px; box-shadow: 0 0 10px #00ffff; }
        #ground { position: absolute; width: 100%; height: 50px; background: #222; border-top: 4px solid #fff; bottom: 0; }
        #scoreBoard { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 20px; font-weight: bold; z-index: 10; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 30; }
        #gameOverScreen h1 { font-size: 36px; color: #ff007f; margin-bottom: 10px; }
        #restartBtn { padding: 12px 30px; font-size: 18px; font-weight: bold; background: #00ffff; color: #000; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 0 15px #00ffff; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="scoreBoard">स्कोर: <span id="score">0</span></div>
        <div id="player"></div>
        <div id="ground"></div>
        <div id="gameOverScreen">
            <h1>गेम ओवर!</h1>
            <p style="margin-bottom:20px;">आपका स्कोर: <span id="finalScore">0</span></p>
            <button id="restartBtn">फिर से खेलें</button>
        </div>
    </div>
    <script>
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        
        let score = 0, gameActive = true, isJumping = false, obstacleTimeout;
        let playerY = 0, jumpVelocity = 0;
        const gravity = 0.6, jumpForce = 12;

        // स्मूथ जंप (Physics Based)
        function updatePhysics() {
            if (!gameActive) return;
            if (isJumping) {
                jumpVelocity -= gravity;
                playerY += jumpVelocity;
                if (playerY <= 0) {
                    playerY = 0;
                    jumpVelocity = 0;
                    isJumping = false;
                }
                player.style.transform = `translateY(${-playerY}px)`;
            }
            requestAnimationFrame(updatePhysics);
        }

        function jump() {
            if (isJumping || !gameActive) return;
            isJumping = true;
            jumpVelocity = jumpForce;
        }

        function createObstacle() {
            if (!gameActive) return;
            const obstacle = document.createElement('div');
            obstacle.classList.add('obstacle');
            gameContainer.appendChild(obstacle);
            let obstacleLeft = gameContainer.offsetWidth;
            obstacle.style.left = obstacleLeft + 'px';
            let moveSpeed = 5 + Math.floor(score / 5);

            function move() {
                if (!gameActive) { obstacle.remove(); return; }
                obstacleLeft -= moveSpeed;
                obstacle.style.left = obstacleLeft + 'px';

                if (obstacleLeft < -30) {
                    obstacle.remove();
                    score++;
                    scoreDisplay.innerText = score;
                    return;
                }

                let p = player.getBoundingClientRect(), o = obstacle.getBoundingClientRect();
                if (p.left < o.right && p.right > o.left && p.bottom > o.top && p.top < o.bottom) {
                    endGame();
                    return;
                }
                requestAnimationFrame(move);
            }
            requestAnimationFrame(move);
            obstacleTimeout = setTimeout(createObstacle, Math.random() * (1800 - 900) + 900);
        }

        function endGame() {
            gameActive = false;
            clearTimeout(obstacleTimeout);
            finalScoreDisplay.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function restartGame() {
            document.querySelectorAll('.obstacle').forEach(obs => obs.remove());
            score = 0; scoreDisplay.innerText = 0; playerY = 0; jumpVelocity = 0;
            player.style.transform = 'translateY(0px)';
            isJumping = false; gameActive = true;
            gameOverScreen.style.display = 'none';
            requestAnimationFrame(updatePhysics);
            createObstacle();
        }

        // कंट्रोल्स (Instant Touch Response)
        gameContainer.addEventListener('touchstart', (e) => { if(gameActive) { e.preventDefault(); jump(); } }, {passive: false});
        gameContainer.addEventListener('mousedown', () => { if(gameActive) jump(); });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
        
        restartBtn.addEventListener('click', (e) => { e.stopPropagation(); restartGame(); });
        restartBtn.addEventListener('touchstart', (e) => { e.stopPropagation(); restartGame(); });

        // स्टार्ट
        requestAnimationFrame(updatePhysics);
        createObstacle();
    </script>
</body>
</html>
